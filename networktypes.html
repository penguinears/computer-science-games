<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Network Types Match | Computer Science Vault</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: white;
    color: black;
    text-align: center;
}

h1 {
    margin-top: 30px;
}

.game {
    max-width: 700px;
    margin: auto;
}

.card {
    display: inline-block;
    padding: 15px;
    margin: 10px;
    border: 2px solid #333;
    border-radius: 10px;
    cursor: pointer;
    background: #f5f5f5;
}

.card:hover {
    background: #ddd;
}

.selected {
    background: #90ee90;
}

#score {
    font-size: 20px;
}
</style>

</head>

<body>

<h1>Network Types Match</h1>
<p>Match the network abbreviation with its meaning.</p>

<div class="game">

<h2>Terms</h2>
<div id="terms"></div>

<h2>Meanings</h2>
<div id="meanings"></div>

<p id="message"></p>

<p id="score">Score: 0</p>

</div>


<script>

const pairs = [
    ["LAN", "Local Area Network"],
    ["WAN", "Wide Area Network"],
    ["MAN", "Metropolitan Area Network"],
    ["PAN", "Personal Area Network"],
    ["IP", "Internet Protocol"],
    ["DNS", "Domain Name System"],
    ["HTTP", "Website communication protocol"]
];


let score = 0;
let selectedTerm = null;


let terms = [...pairs].sort(() => Math.random() - 0.5);
let meanings = [...pairs].sort(() => Math.random() - 0.5);


let termsBox = document.getElementById("terms");
let meaningsBox = document.getElementById("meanings");


terms.forEach(pair => {

    let div = document.createElement("div");

    div.className = "card";
    div.textContent = pair[0];

    div.onclick = () => {

        selectedTerm = pair;

        document.querySelectorAll("#terms .card")
        .forEach(c => c.classList.remove("selected"));

        div.classList.add("selected");
    };

    termsBox.appendChild(div);

});


meanings.forEach(pair => {

    let div = document.createElement("div");

    div.className = "card";
    div.textContent = pair[1];


    div.onclick = () => {

        if(selectedTerm){

            if(selectedTerm[1] === pair[1]){

                score++;

                document.getElementById("message")
                .textContent = "Correct!";

                div.style.display="none";

                document.querySelector(".selected")
                .style.display="none";

            } else {

                document.getElementById("message")
                .textContent = "Wrong match!";

            }

            document.querySelectorAll(".selected")
            .forEach(c => c.classList.remove("selected"));

            selectedTerm = null;

            document.getElementById("score")
            .textContent = "Score: " + score;

        }

    };


    meaningsBox.appendChild(div);

});

</script>

</body>
</html>
