<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bubble Sort Tutorial | Computer Science Vault</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align:center;
    background:white;
    color:black;
}

h1 {
    margin-top:30px;
}

.grid {
    display:flex;
    justify-content:center;
    gap:8px;
    margin:40px auto;
    width:fit-content;
    transition:1s;
}

.number {
    border:2px solid black;
    padding:15px;
    width:35px;
    font-size:22px;
    border-radius:8px;
}

.highlight {
    background:yellow;
}

.fade {
    opacity:0;
}

button {
    padding:12px 25px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

#complete {
    font-size:30px;
    font-weight:bold;
    display:none;
}

</style>

</head>

<body>

<button onclick="location.href='index.html'">
Back
</button>

<h1>Bubble Sort Tutorial Game</h1>

<p>Should these numbers swap?</p>


<div class="grid" id="grid"></div>


<h2 id="question"></h2>


<div id="buttons">

<button onclick="answer(true)">
YES - Swap
</button>

<button onclick="answer(false)">
NO - Keep
</button>

</div>


<h2 id="complete">
All Complete! 🎉
</h2>


<p>
Moves: <span id="moves">0</span>
</p>


<script>

let numbers=[];

let index=0;

let pass=0;

let moves=0;



function start(){

numbers=[];

while(numbers.length < 10){

let n=Math.floor(Math.random()*90)+1;

if(!numbers.includes(n)){
numbers.push(n);
}

}

show();

}



function show(){

let grid=document.getElementById("grid");

grid.innerHTML="";


numbers.forEach((num,i)=>{

let box=document.createElement("div");

box.className="number";


if(i===index || i===index+1){
box.classList.add("highlight");
}


box.textContent=num;

grid.appendChild(box);

});


document.getElementById("question").textContent =
numbers[index]+" and "+numbers[index+1]+" compare";

}



function answer(swap){


if(swap){

let temp=numbers[index];

numbers[index]=numbers[index+1];

numbers[index+1]=temp;

moves++;

}


index++;


if(index >= numbers.length-1){

index=0;

pass++;


if(pass>=numbers.length){

finish();

return;

}

}


document.getElementById("moves").textContent=moves;


show();


}



function finish(){


let grid=document.getElementById("grid");


grid.classList.add("fade");


document.getElementById("buttons").style.display="none";


document.getElementById("question").style.display="none";


document.getElementById("complete").style.display="block";


}


start();

</script>

</body>
</html>
